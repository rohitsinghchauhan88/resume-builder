<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Resume Builder</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header>
<h1>Resume Builder</h1>

<div class="header-buttons">
<button id="themeToggle">🌙 Theme</button>

<button onclick="window.open('https://digitalheroesco.com','_blank')">
Built for Digital Heroes
</button>
</div>
</header>

<div class="container">

<div class="form-card">

<h2>Resume Information</h2>

<input type="file" id="photo">

<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="address" placeholder="Address">

<textarea id="objective" placeholder="Career Objective"></textarea>
<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="education" placeholder="Education"></textarea>
<textarea id="experience" placeholder="Work Experience"></textarea>
<textarea id="projects" placeholder="Projects"></textarea>
<textarea id="certifications" placeholder="Certifications"></textarea>
<textarea id="languages" placeholder="Languages"></textarea>

<div class="btn-group">
<button id="downloadBtn">Download PDF</button>
<button id="clearBtn">Clear Form</button>
</div>

</div>

<div class="resume-card" id="resume">

<div class="resume-header">
<img id="previewPhoto" src="" alt="">
<h2 id="previewName">Rohit Singh Chauhan</h2>
<p id="previewEmail">your-email@gmail.com</p>
<p id="previewPhone"></p>
<p id="previewAddress"></p>
</div>

<div class="section">
<h3>Career Objective</h3>
<p id="previewObjective"></p>
</div>

<div class="section">
<h3>Skills</h3>
<p id="previewSkills"></p>
</div>

<div class="section">
<h3>Education</h3>
<p id="previewEducation"></p>
</div>

<div class="section">
<h3>Experience</h3>
<p id="previewExperience"></p>
</div>

<div class="section">
<h3>Projects</h3>
<p id="previewProjects"></p>
</div>

<div class="section">
<h3>Certifications</h3>
<p id="previewCertifications"></p>
</div>

<div class="section">
<h3>Languages</h3>
<p id="previewLanguages"></p>
</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
